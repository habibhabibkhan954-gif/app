name: BUILD APK NEW Automatic

on:
  push:                # no branches filter — runs on push to any branch
  pull_request:        # runs on PRs targeting any branch
  workflow_dispatch:   # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build (assembleRelease) using wrapper
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
          RELEASE_KEYSTORE: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: "opensource_build_key"
          RELEASE_KEY_ALIAS: "release-alias"
          RELEASE_KEY_PASSWORD: "opensource_build_key"

      - name: Upload Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
